name: Build and commit dist
on:
  push:
    branches: ['claude/fix-drive-timezone']
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/fix-drive-timezone
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm run build
      - name: Commit dist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/dist -f
          git diff --staged --quiet && echo "No changes" || (git commit -m "chore: rebuild dist [skip ci]" && git push origin claude/fix-drive-timezone)
