# ── DealerSuite Loaner Inspection — Railway deployment config ─────────────────
#
# Single-service deployment:
#   1. Builds the React frontend (npm ci + npm run build)
#   2. Copies the dist into backend/frontend_dist
#   3. Installs Python dependencies
#   4. Starts the FastAPI server (uvicorn)
#
# FastAPI then serves /api/* routes AND the React SPA from the same URL.
# No second Railway service needed.
#
# Required Railway environment variables:
#   DATABASE_URL                    — auto-injected by Railway PostgreSQL plugin
#   JWT_SECRET                      — long random string
#   FRONTEND_URL                    — set to your Railway app URL after first deploy
#   GOOGLE_SERVICE_ACCOUNT_JSON     — (optional) base64-encoded service account JSON
#   ENVIRONMENT                     — production

[build]
builder      = "NIXPACKS"
buildCommand = "cd frontend && npm ci && npm run build && cp -r dist ../backend/frontend_dist && cd ../backend && python -m pip install -r requirements.txt"

[deploy]
startCommand     = "cd backend && alembic upgrade head && python seed.py && uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath  = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
